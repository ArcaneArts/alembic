name: Desktop CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: desktop-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Dart and Flutter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      - name: Cache Dart packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache/bin
            ~/.pub-cache/git
            ~/.pub-cache/global_packages
            ~/.pub-cache/hosted
          key: pub-cache-${{ runner.os }}-${{ hashFiles('pubspec.yaml', 'pubspec.lock') }}
          restore-keys: |
            pub-cache-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs:
      - validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      - name: Cache Dart packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache/bin
            ~/.pub-cache/git
            ~/.pub-cache/global_packages
            ~/.pub-cache/hosted
          key: pub-cache-${{ runner.os }}-${{ hashFiles('pubspec.yaml', 'pubspec.lock') }}
          restore-keys: |
            pub-cache-${{ runner.os }}-

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/CocoaPods
            macos/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('macos/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Build macOS app
        env:
          ALEMBIC_BUILD_ID: ${{ github.sha }}
        run: scripts/release/build_macos.sh "$(grep '^version:' pubspec.yaml | sed -E 's/^version:[[:space:]]*//')" release-ci

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v6
        with:
          name: alembic-macos-app
          path: release-ci/Alembic-*-macos*
          if-no-files-found: error
          retention-days: 3

  build-windows:
    name: Build Windows
    runs-on: windows-2022
    needs:
      - validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      - name: Setup Inno Setup
        run: choco install innosetup -y

      - name: Cache Dart packages
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\Pub\Cache\bin
            ~\AppData\Local\Pub\Cache\git
            ~\AppData\Local\Pub\Cache\global_packages
            ~\AppData\Local\Pub\Cache\hosted
          key: pub-cache-${{ runner.os }}-${{ hashFiles('pubspec.yaml', 'pubspec.lock') }}
          restore-keys: |
            pub-cache-${{ runner.os }}-

      - name: Cache Windows Flutter metadata
        uses: actions/cache@v5
        with:
          path: |
            .dart_tool
          key: windows-build-${{ runner.os }}-${{ hashFiles('pubspec.yaml', 'pubspec.lock', 'windows/**', 'lib/**', 'assets/**') }}
          restore-keys: |
            windows-build-${{ runner.os }}-

      - name: Build Windows app
        shell: pwsh
        env:
          ALEMBIC_BUILD_ID: ${{ github.sha }}
        run: |
          $version = (Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$').Matches[0].Groups[1].Value.Trim()
          ./scripts/release/build_windows.ps1 -Version $version -Out release-ci

      - name: Upload Windows app artifact
        uses: actions/upload-artifact@v6
        with:
          name: alembic-windows-app
          path: release-ci/Alembic-*-windows-x64.*
          if-no-files-found: error
          retention-days: 3

  publish-main-release:
    name: Publish latest updater release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - build-macos
      - build-windows
    permissions:
      actions: read
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      - name: Download desktop assets
        uses: actions/download-artifact@v7
        with:
          pattern: alembic-*-app
          merge-multiple: true
          path: release

      - name: Get dependencies
        run: flutter pub get

      - name: Generate update manifest
        run: |
          set -euo pipefail
          version="$(grep '^version:' pubspec.yaml | sed -E 's/^version:[[:space:]]*//')"
          dart run scripts/release/generate_release_manifest.dart \
            --dist release \
            --version "$version" \
            --repository "$GITHUB_REPOSITORY" \
            --tag latest \
            --build-id "$GITHUB_SHA" \
            --published-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Verify release assets
        run: |
          set -euo pipefail
          version="$(grep '^version:' pubspec.yaml | sed -E 's/^version:[[:space:]]*//')"
          for asset in \
            "Alembic-$version-macos-universal.zip" \
            "Alembic-$version-macos.dmg" \
            "Alembic-$version-windows-x64.zip" \
            "Alembic-$version-windows-x64.exe" \
            update.json \
            checksums.txt; do
            test -s "release/$asset"
          done

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="$(grep '^version:' pubspec.yaml | sed -E 's/^version:[[:space:]]*//')"
          tag="latest"
          notes="Continuous Alembic desktop build from ${GITHUB_SHA}."
          git tag -f "$tag" "$GITHUB_SHA"
          git push origin "refs/tags/$tag" --force
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release view "$tag" --json assets -q '.assets[].name' |
              while IFS= read -r asset; do
                if [ -n "$asset" ]; then
                  gh release delete-asset "$tag" "$asset" -y
                fi
              done
            gh release upload "$tag" release/*
            gh release edit "$tag" --title "Alembic $version Latest" --notes "$notes" --latest
          else
            gh release create "$tag" release/* --target "$GITHUB_SHA" --title "Alembic $version Latest" --notes "$notes" --latest
          fi
