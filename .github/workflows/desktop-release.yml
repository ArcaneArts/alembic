name: Desktop Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate-version:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}

      - name: Validate tag matches pubspec
        id: version
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="$REF_NAME"
          if [[ "$REF_TYPE" != "tag" ]]; then
            tag="$INPUT_TAG"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][A-Za-z0-9.-]+)?$ ]]; then
            echo "::error title=Invalid release tag::$tag must look like v1.2.3"
            exit 1
          fi
          version="${tag#v}"
          pubspec_version="$(grep '^version:' pubspec.yaml | sed -E 's/^version:[[:space:]]*//')"
          if [[ "$version" != "$pubspec_version" ]]; then
            echo "::error title=Release version mismatch::Tag $tag does not match pubspec.yaml version $pubspec_version"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-macos:
    name: Build unsigned macOS release
    runs-on: macos-latest
    needs:
      - validate-version

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-version.outputs.tag }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Dart packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache/bin
            ~/.pub-cache/git
            ~/.pub-cache/global_packages
            ~/.pub-cache/hosted
          key: pub-cache-${{ runner.os }}-${{ hashFiles('pubspec.yaml', 'pubspec.lock') }}
          restore-keys: |
            pub-cache-${{ runner.os }}-

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/CocoaPods
            macos/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('macos/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Build macOS release assets
        run: scripts/release/build_macos.sh "${{ needs.validate-version.outputs.version }}" release

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v6
        with:
          name: release-macos
          path: release/*
          if-no-files-found: error
          retention-days: 3

  build-windows:
    name: Build Windows release
    runs-on: windows-latest
    needs:
      - validate-version

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-version.outputs.tag }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Inno Setup
        run: choco install innosetup -y

      - name: Cache Dart packages
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\Pub\Cache\bin
            ~\AppData\Local\Pub\Cache\git
            ~\AppData\Local\Pub\Cache\global_packages
            ~\AppData\Local\Pub\Cache\hosted
          key: pub-cache-${{ runner.os }}-${{ hashFiles('pubspec.yaml', 'pubspec.lock') }}
          restore-keys: |
            pub-cache-${{ runner.os }}-

      - name: Build Windows release assets
        shell: pwsh
        run: ./scripts/release/build_windows.ps1 -Version "${{ needs.validate-version.outputs.version }}" -Out release

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v6
        with:
          name: release-windows
          path: release/*
          if-no-files-found: error
          retention-days: 3

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate-version
      - build-macos
      - build-windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-version.outputs.tag }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Download release assets
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          merge-multiple: true
          path: release

      - name: Get dependencies
        run: flutter pub get

      - name: Generate update manifest
        run: |
          dart run scripts/release/generate_release_manifest.dart \
            --dist release \
            --version "${{ needs.validate-version.outputs.version }}" \
            --repository "$GITHUB_REPOSITORY" \
            --tag "${{ needs.validate-version.outputs.tag }}" \
            --published-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Verify release assets
        run: |
          set -euo pipefail
          version="${{ needs.validate-version.outputs.version }}"
          for asset in \
            "Alembic-$version-macos-universal.zip" \
            "Alembic-$version-macos.dmg" \
            "Alembic-$version-windows-x64.zip" \
            "Alembic-$version-windows-x64.exe" \
            update.json \
            checksums.txt; do
            test -s "release/$asset"
          done

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ needs.validate-version.outputs.tag }}"
          version="${{ needs.validate-version.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release/* --clobber
          else
            gh release create "$tag" release/* --title "Alembic $version" --notes "Alembic $version"
          fi
