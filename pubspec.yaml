name: alembic
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.10
environment:
  sdk: '>=3.4.4 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  window_manager: ^0.5.1
  tray_manager: ^0.5.2
  screen_retriever: ^0.2.0
  flutter_acrylic: ^1.1.4
  github: ^9.25.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  fast_log: ^1.0.7
  flutter_svg: ^2.2.3
  oauth2: ^2.0.5
  launch_at_startup: ^0.5.1
  package_info_plus: ^9.0.0
  http: ^1.6.0
  file_picker: ^10.3.10
  hive_flutter: ^1.1.0
  liquid_glass_easy: ^1.1.1
  rxdart: ^0.28.0
  liquid_glass_renderer: ^0.2.0-dev.4
  liquid_glass_widgets: ^0.3.0-dev.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  assets:
    - assets/
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
        - asset: assets/fonts/PlusJakartaSans-Italic-Variable.ttf
          style: italic
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Variable.ttf
        - asset: assets/fonts/JetBrainsMono-Italic-Variable.ttf
          style: italic
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/launcher.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: true
    image_path: "assets/launcher.png"
scripts:
  pod_install_mac: cd macos && rm Podfile.lock && pod install --repo-update
  codesign: cd build/macos/Build/Products/Release && codesign --deep --force --verify --sign "Alembic" alembic.app
  launcher_icons: flutter pub get && dart run flutter_launcher_icons
  distrib: grep '^version:' pubspec.yaml | sed -E 's/^version:\s*//; s/^[[:space:]]+//; s/[[:space:]]+$//' > version && rm -rf dist && dart pub global activate flutter_distributor && npm install -g appdmg && flutter_distributor package --platform macos --targets dmg --skip-clean
